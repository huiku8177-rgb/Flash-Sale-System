spring:
  application:
    name: gateway
  cloud:
    nacos:
      server-addr: 192.168.100.130:8848
      discovery:
        namespace: cac2e129-5c78-402a-bdd1-b9dbb0892486
        # 确保 Nacos 客户端完全初始化后再注册
        register-enabled: true
      config:
        enabled: false
    gateway:
      routes:
        - id: auth-service
          uri: lb://auth-service
          predicates:
            - Path=/auth/**
        - id: order-service
          uri: lb://order-service
          predicates:
            - Path=/order/**
        - id: seckill-service
          uri: lb://seckill-service
          predicates:
            - Path=/seckill/**
        - id: seckill-product-service
          uri: lb://seckill-service
          predicates:
            - Path=/seckill-product/**
        - id: product-service
          uri: lb://product-service
          predicates:
            - Path=/product/**
        - id: product-service-docs
          uri: lb://product-service
          predicates:
            - Path=/v3/api-docs/product-service
          filters:
            - SetPath=/v3/api-docs
        - id: auth-service-docs
          uri: lb://auth-service
          predicates:
            - Path=/v3/api-docs/auth-service
          filters:
            - SetPath=/v3/api-docs
        - id: seckill-service-docs
          uri: lb://seckill-service
          predicates:
            - Path=/v3/api-docs/seckill-service
          filters:
            - SetPath=/v3/api-docs
        - id: order-service-docs
          uri: lb://order-service
          predicates:
            - Path=/v3/api-docs/order-service
          filters:
            - SetPath=/v3/api-docs

server:
  port: 8080

springdoc:
  swagger-ui:
    path: /swagger-ui.html
    persist-authorization: true
    try-it-out-enabled: true
    display-request-duration: true
    urls:
      - name: 认证服务
        url: /v3/api-docs/auth-service
      - name: 普通商品服务
        url: /v3/api-docs/product-service
      - name: 秒杀服务
        url: /v3/api-docs/seckill-service
      - name: 订单服务
        url: /v3/api-docs/order-service

flash-sale:
  jwt:
    location: classpath:flash-sale.jks
    alias: flash-sale
    password: 123321
    tokenTTL: 30m
  auth:
    excludePaths:
      - POST:/auth/login
      - POST:/auth/register
      - GET:/product/products
      - GET:/product/products/**
      - GET:/seckill-product/products
      - GET:/seckill-product/products/**
      - /swagger-ui.html
      - /swagger-ui/**
      - /v3/api-docs
      - /v3/api-docs/**
      - /error
      - /favicon.ico
