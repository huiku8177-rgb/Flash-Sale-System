spring:
  cloud:
    openfeign:
      client:
        config:
          default:
            connectTimeout: 3000
            readTimeout: 5000
            loggerLevel: basic
  main:
    allow-bean-definition-overriding: true

mybatis:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.flashsale.productservice.domain.po,com.flashsale.productservice.domain.vo,com.flashsale.productservice.domain.dto

springdoc:
  api-docs:
    path: /v3/api-docs

flash-sale:
  cache:
    product:
      list-ttl-seconds: 60
      detail-ttl-seconds: 60
    cart:
      ttl-seconds: 120
