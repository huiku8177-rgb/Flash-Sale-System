spring:
  application:
    name: ai-service
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}
  config:
    import:
      - optional:nacos:flash-sale-common.yaml?group=${FLASH_SALE_NACOS_GROUP:FLASH_SALE}
      - optional:nacos:flash-sale-mysql.yaml?group=${FLASH_SALE_NACOS_GROUP:FLASH_SALE}
      - optional:nacos:flash-sale-redis.yaml?group=${FLASH_SALE_NACOS_GROUP:FLASH_SALE}
      - optional:nacos:${spring.application.name}.yaml?group=${FLASH_SALE_NACOS_GROUP:FLASH_SALE}
  cloud:
    nacos:
      server-addr: ${FLASH_SALE_NACOS_ADDR:192.168.100.130:8848}
      discovery:
        namespace: ${FLASH_SALE_NACOS_NAMESPACE:cac2e129-5c78-402a-bdd1-b9dbb0892486}
        register-enabled: ${FLASH_SALE_NACOS_DISCOVERY_ENABLED:true}
      config:
        enabled: ${FLASH_SALE_NACOS_CONFIG_ENABLED:true}
        namespace: ${FLASH_SALE_NACOS_NAMESPACE:cac2e129-5c78-402a-bdd1-b9dbb0892486}
        group: ${FLASH_SALE_NACOS_GROUP:FLASH_SALE}
        file-extension: yaml
        refresh-enabled: true
  data:
    redis:
      timeout: 3s

server:
  port: ${FLASH_SALE_AI_PORT:8085}

ai:
  enabled: ${FLASH_SALE_AI_ENABLED:false}
  base-url: ${FLASH_SALE_AI_BASE_URL:}
  api-key: ${FLASH_SALE_AI_API_KEY:}
  embedding-model: ${FLASH_SALE_AI_EMBEDDING_MODEL:text-embedding-v1}
  chat-model: ${FLASH_SALE_AI_CHAT_MODEL:qwen-turbo}
  product-service-url: ${FLASH_SALE_PRODUCT_SERVICE_URL:http://localhost:8084}
  seckill-service-url: ${FLASH_SALE_SECKILL_SERVICE_URL:http://localhost:8081}
  retrieval-top-k: ${FLASH_SALE_AI_RETRIEVAL_TOP_K:5}
  history-limit: ${FLASH_SALE_AI_HISTORY_LIMIT:6}
  min-confidence: ${FLASH_SALE_AI_MIN_CONFIDENCE:0.55}
  session-ttl-days: ${FLASH_SALE_AI_SESSION_TTL_DAYS:7}
  session-query-limit: ${FLASH_SALE_AI_SESSION_QUERY_LIMIT:50}
  history-cache-size: ${FLASH_SALE_AI_HISTORY_CACHE_SIZE:6}
  cleanup:
    initial-delay-ms: ${FLASH_SALE_AI_CLEANUP_INITIAL_DELAY_MS:60000}
    fixed-delay-ms: ${FLASH_SALE_AI_CLEANUP_FIXED_DELAY_MS:3600000}
  rule-documents:
    - title: 售后政策
      source-type: RULE
      content: >
        平台默认支持商品签收后七天无理由退货，前提是商品保持完好且不影响二次销售。
        涉及质量问题时优先走售后工单，退款到账时间以支付渠道处理结果为准。
    - title: 配送政策
      source-type: RULE
      content: >
        平台默认在支付成功后尽快发货，具体发货时效、物流公司和运费以商品详情页和结算页展示为准。
        偏远地区、预售商品和大促高峰可能导致时效波动。
    - title: 秒杀活动规则
      source-type: RULE
      content: >
        秒杀商品价格、库存和活动时间以页面实时展示为准。
        活动库存变化较快，如页面提示售罄或活动结束，应以实时状态为最终结果。

mybatis:
  mapper-locations: classpath*:mapper/*.xml
  type-aliases-package: com.flashsale.aiservice.domain.po

springdoc:
  api-docs:
    enabled: true
  swagger-ui:
    path: /swagger-ui.html
